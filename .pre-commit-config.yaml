repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Mirrors the "OSS hygiene" job in .github/workflows/ci.yml — same regex,
      # same placeholder allow-list, so a contributor can't pass locally and
      # fail in CI (or vice versa). Tests are deliberately included in scope.
      - id: block-local-paths
        name: Block hardcoded /Users/ and /home/ paths
        entry: '/(Users|home)/(?!(someone|user|username|example|test|you)(/|"|''|\$|$))[a-zA-Z0-9_.-]+/'
        language: pygrep
        types: [text]
        exclude: '\.(md|lock)$|\.gitignore$|\.pre-commit-config\.yaml$|Implementation/|docs/internal/|\.venv/'

      # Sanity check — gitleaks in CI is the authority (100+ patterns). These
      # catch the high-likelihood leaks for this repo's ecosystem before they
      # reach the remote. `sk-[_-]` covers OpenAI legacy + sk-ant- (Anthropic)
      # + sk-proj- / sk-svcacct- (OpenAI new).
      - id: block-api-keys
        name: Block common API key patterns
        entry: '(sk-[a-zA-Z0-9_-]{20,}|AIza[0-9A-Za-z_-]{35}|ghp_[a-zA-Z0-9]{36}|xoxb-[a-zA-Z0-9-]+)'
        language: pygrep
        types: [text]
        exclude: '\.(md|lock)$|\.pre-commit-config\.yaml$'
